<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudFund – Chit Fund Bidding</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* overall page feel */
    body {
      background-color: #f0f4f8;
      font-family: 'Space Grotesk', sans-serif;
      color: #1a1a2e;
    }

    /* navbar */
    .navbar {
      background: linear-gradient(90deg, #1a1a2e, #16213e);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .navbar-brand {
      font-weight: 700;
      font-size: 1.4rem;
      color: #e94560 !important;
      letter-spacing: 1px;
    }
    .nav-link {
      color: #ccc !important;
      transition: color 0.2s;
    }
    .nav-link:hover {
      color: #e94560 !important;
    }

    /* cards */
    .card {
      border: none;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    .card-header {
      border-radius: 12px 12px 0 0 !important;
      font-weight: 600;
      font-size: 1.05rem;
    }

    /* badge colors */
    .badge-active { background-color: #198754; }
    .badge-inactive { background-color: #6c757d; }

    /* page heading */
    .page-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: #16213e;
      margin-bottom: 1.2rem;
    }

    /* winner highlight */
    .winner-box {
      background: linear-gradient(135deg, #ffe082, #ffca28);
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
      box-shadow: 0 4px 16px rgba(255,202,40,0.35);
    }
    .winner-box h4 {
      font-weight: 700;
      color: #5d4037;
    }

    /* footer */
    footer {
      text-align: center;
      padding: 1.5rem;
      color: #888;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="{% url 'home' %}">💰 CloudFund</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'join' %}">Join Fund</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'participants' %}">Participants</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'bidding' %}">Bidding</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4 mb-5">

  <!-- flash messages -->
  {% for message in messages %}
    <div class="alert alert-{% if message.tags == 'error' %}danger{% elif message.tags == 'warning' %}warning{% elif message.tags == 'success' %}success{% else %}info{% endif %} alert-dismissible fade show" role="alert">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
  {% endfor %}

  {% block content %}{% endblock %}
</div>

<footer>
  <p>CloudFund &copy; 2025 — Simple Chit Fund Bidding System</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
